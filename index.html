<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my playlist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0f0a;
    --surface: #231510;
    --surface2: #2e1a12;
    --accent: #E8724A;
    --accent2: #F2A26E;
    --text: #F5E6DC;
    --muted: #9A7060;
    --border: rgba(232,114,74,0.15);
    --bar-bg: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    width: 100%;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .playlist-cover {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #E8724A, #C04E3A, #7A2820);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .playlist-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(242,162,110,0.4), transparent 60%);
  }
  .cover-icon {
    font-size: 48px;
    position: relative;
    z-index: 1;
  }
  .playlist-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .playlist-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .track-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  .track-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
    position: relative;
  }
  .track-item:hover { background: var(--surface2); }
  .track-item.active { background: rgba(232,114,74,0.12); }
  .track-item.active .track-name { color: var(--accent); }
  .track-num {
    font-size: 11px;
    color: var(--muted);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .track-item.active .track-num { color: var(--accent); }
  .track-thumb {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    background: var(--surface2);
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .track-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .track-thumb-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #3a1f15, #5a2e1e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }
  .track-channel {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .track-dur {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* MAIN AREA */
  .main {
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .player-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .now-playing-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .main-cover {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    background: linear-gradient(135deg, #E8724A, #C04E3A, #7A2820);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(232,114,74,0.2);
  }
  .main-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(242,162,110,0.35), transparent 60%);
  }
  .main-cover-icon { font-size: 72px; position: relative; z-index: 1; }
  .main-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    border-radius: 12px;
  }
  .track-details { text-align: center; margin-bottom: 28px; }
  .track-details .name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .track-details .channel {
    font-size: 13px;
    color: var(--muted);
  }

  /* PROGRESS */
  .progress-section { width: 100%; max-width: 380px; margin-bottom: 24px; }
  .progress-bar-wrap {
    position: relative;
    height: 4px;
    background: var(--bar-bg);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    position: relative;
  }
  .progress-bar-fill::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .progress-bar-wrap:hover .progress-bar-fill::after { opacity: 1; }
  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
  .play-pause {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(232,114,74,0.4);
  }
  .play-pause:hover { background: var(--accent2); transform: scale(1.05); }
  .play-pause:active { transform: scale(0.97); }

  /* VOLUME */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 380px;
  }
  .vol-icon { color: var(--muted); flex-shrink: 0; }
  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--bar-bg);
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* PLAYER BAR BOTTOM */
  .player-bar {
    border-top: 0.5px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    font-size: 11px;
    color: var(--muted);
  }
  .bar-track { display: flex; align-items: center; gap: 10px; }
  .bar-thumb {
    width: 40px;
    height: 40px;
    border-radius: 4px;
    background: var(--surface2);
    overflow: hidden;
    flex-shrink: 0;
  }
  .bar-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .bar-thumb-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #3a1f15, #5a2e1e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .bar-name { font-size: 12px; color: var(--text); font-weight: 500; }
  .bar-channel { font-size: 10px; color: var(--muted); }
  .yt-hidden {
    position: fixed;
    bottom: -9999px;
    left: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* EDIT PANEL */
  .edit-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 100;
    transition: background 0.15s;
  }
  .edit-btn:hover { background: var(--surface); }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .modal p { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .modal label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .modal input, .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    margin-bottom: 12px;
    outline: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { height: 80px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-cancel {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-save {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-save:hover { background: var(--accent2); }
  .track-editor-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .track-editor-row:last-child { border-bottom: none; }
  .track-editor-inputs { flex: 1; }
  .btn-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    margin-top: 2px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: #E24B4A; }
  .btn-add-track {
    background: none;
    border: 0.5px dashed var(--border);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .btn-add-track:hover { background: var(--surface2); }
</style>
</head>
<body>

<button class="edit-btn" onclick="openModal()">✏ edit playlist</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>edit playlist</h2>
    <p>paste YouTube video IDs (the part after ?v= in the URL) and fill in track details.</p>
    <label>playlist name</label>
    <input type="text" id="playlistNameInput" placeholder="my playlist" />
    <div id="trackEditors"></div>
    <button class="btn-add-track" onclick="addTrackEditor()">+ add track</button>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" onclick="savePlaylist()">save</button>
    </div>
  </div>
</div>

<div id="ytPlayer" class="yt-hidden"></div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="playlist-cover"><span class="cover-icon">🎵</span></div>
      <div class="playlist-title" id="sidebarTitle">my playlist</div>
      <div class="playlist-meta" id="sidebarMeta">0 tracks</div>
    </div>
    <div class="track-list" id="trackList"></div>
  </div>

  <div class="main">
    <div class="player-area">
      <div class="now-playing-label">now playing</div>
      <div class="main-cover" id="mainCover">
        <span class="main-cover-icon">🎵</span>
      </div>
      <div class="track-details">
        <div class="name" id="mainTrackName">select a track</div>
        <div class="channel" id="mainTrackChannel">—</div>
      </div>
      <div class="progress-section">
        <div class="progress-bar-wrap" id="progressWrap" onclick="seekTo(event)">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()" title="previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-pause" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()" title="next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.14 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </div>
    </div>

    <div class="player-bar">
      <div class="bar-track">
        <div class="bar-thumb" id="barThumb"><div class="bar-thumb-placeholder">🎵</div></div>
        <div>
          <div class="bar-name" id="barName">—</div>
          <div class="bar-channel" id="barChannel">—</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);">powered by youtube</div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let playlist = JSON.parse(localStorage.getItem('myPlaylist') || 'null') || {
  name: 'my playlist',
  tracks: [
    { id: 'jfKfPfyJRdk', name: 'lofi hip hop radio', channel: 'lofi girl', duration: 'live' },
    { id: '5qap5aO4i9A', name: 'lofi hip hop — beats to relax', channel: 'lofi girl', duration: 'live' },
    { id: 'Na0w3Mz46GA', name: 'sunset lofi beats', channel: 'lofi chill', duration: '1:02:34' },
  ]
};

let player, currentIndex = 0, isPlaying = false, progressInterval;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytPlayer', {
    height: '1', width: '1',
    videoId: playlist.tracks[0]?.id || '',
    playerVars: { autoplay: 0, controls: 0 },
    events: { onReady: onPlayerReady, onStateChange: onStateChange }
  });
}

function onPlayerReady() {
  setVolume(document.getElementById('volSlider').value);
  renderAll();
}

function onStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) nextTrack();
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true; updatePlayIcon();
    progressInterval = setInterval(updateProgress, 500);
  } else {
    isPlaying = false; updatePlayIcon();
    clearInterval(progressInterval);
  }
}

function renderAll() {
  document.getElementById('sidebarTitle').textContent = playlist.name;
  document.getElementById('sidebarMeta').textContent = playlist.tracks.length + ' tracks';
  const list = document.getElementById('trackList');
  list.innerHTML = '';
  playlist.tracks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'track-item' + (i === currentIndex ? ' active' : '');
    el.onclick = () => loadTrack(i, true);
    el.innerHTML = `
      <span class="track-num">${i + 1}</span>
      <div class="track-thumb"><div class="track-thumb-placeholder">🎵</div></div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-channel">${t.channel}</div>
      </div>
      <span class="track-dur">${t.duration || ''}</span>`;
    list.appendChild(el);
  });
  updateNowPlaying();
}

function updateNowPlaying() {
  const t = playlist.tracks[currentIndex];
  if (!t) return;
  document.getElementById('mainTrackName').textContent = t.name;
  document.getElementById('mainTrackChannel').textContent = t.channel;
  document.getElementById('barName').textContent = t.name;
  document.getElementById('barChannel').textContent = t.channel;
  document.getElementById('mainCover').innerHTML = `<span class="main-cover-icon">🎵</span>`;
  document.getElementById('barThumb').innerHTML = `<div class="bar-thumb-placeholder">🎵</div>`;
  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });
}

function loadTrack(index, autoplay) {
  currentIndex = index;
  const t = playlist.tracks[index];
  if (!t || !player) return;
  if (autoplay) { player.loadVideoById(t.id); isPlaying = true; }
  else { player.cueVideoById(t.id); isPlaying = false; }
  updateNowPlaying();
  updatePlayIcon();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('totalTime').textContent = t.duration || '0:00';
}

function togglePlay() {
  if (!player) return;
  if (isPlaying) { player.pauseVideo(); }
  else { player.playVideo(); }
}

function updatePlayIcon() {
  document.getElementById('playIcon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function nextTrack() {
  loadTrack((currentIndex + 1) % playlist.tracks.length, isPlaying);
}

function prevTrack() {
  loadTrack((currentIndex - 1 + playlist.tracks.length) % playlist.tracks.length, isPlaying);
}

function setVolume(v) {
  if (player && player.setVolume) player.setVolume(parseInt(v));
}

function updateProgress() {
  if (!player || !player.getDuration) return;
  const dur = player.getDuration();
  const cur = player.getCurrentTime();
  if (dur > 0) {
    document.getElementById('progressFill').style.width = (cur / dur * 100) + '%';
    document.getElementById('currentTime').textContent = fmt(cur);
    document.getElementById('totalTime').textContent = fmt(dur);
  }
}

function seekTo(e) {
  if (!player) return;
  const wrap = document.getElementById('progressWrap');
  const rect = wrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  player.seekTo(player.getDuration() * pct, true);
}

function fmt(s) {
  s = Math.floor(s);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function openModal() {
  document.getElementById('playlistNameInput').value = playlist.name;
  const ed = document.getElementById('trackEditors');
  ed.innerHTML = '';
  playlist.tracks.forEach((t, i) => addTrackEditor(t));
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function addTrackEditor(t) {
  const ed = document.getElementById('trackEditors');
  const row = document.createElement('div');
  row.className = 'track-editor-row';
  row.innerHTML = `
    <div class="track-editor-inputs">
      <label>youtube video id</label>
      <input type="text" placeholder="e.g. jfKfPfyJRdk" value="${t?.id || ''}" data-field="id" />
      <label>track name</label>
      <input type="text" placeholder="track name" value="${t?.name || ''}" data-field="name" />
      <label>channel / artist</label>
      <input type="text" placeholder="channel name" value="${t?.channel || ''}" data-field="channel" />
      <label>duration (optional)</label>
      <input type="text" placeholder="e.g. 3:45" value="${t?.duration || ''}" data-field="duration" />
    </div>
    <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
  ed.appendChild(row);
}

function savePlaylist() {
  const name = document.getElementById('playlistNameInput').value || 'my playlist';
  const rows = document.querySelectorAll('.track-editor-row');
  const tracks = [];
  rows.forEach(row => {
    const id = row.querySelector('[data-field="id"]').value.trim();
    const name2 = row.querySelector('[data-field="name"]').value.trim();
    const channel = row.querySelector('[data-field="channel"]').value.trim();
    const duration = row.querySelector('[data-field="duration"]').value.trim();
    if (id) tracks.push({ id, name: name2 || 'untitled', channel: channel || '—', duration });
  });
  playlist = { name, tracks };
  localStorage.setItem('myPlaylist', JSON.stringify(playlist));
  closeModal();
  currentIndex = 0;
  renderAll();
  if (tracks.length && player) loadTrack(0, false);
}

window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
</script>
</body>
</html>
